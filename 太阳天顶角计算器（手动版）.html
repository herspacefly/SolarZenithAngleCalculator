<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>太阳天顶角计算器</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }
    .container {
      max-width: 860px;
      margin: 24px auto;
      padding: 0 14px 40px;
    }
    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.07);
      padding: 16px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 4px;
      font-size: 22px;
    }
    .subtitle {
      margin: 0 0 14px;
      color: #6b7280;
      line-height: 1.6;
      font-size: 13px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-full {
      grid-column: 1 / -1;
    }
    label {
      font-weight: 600;
      font-size: 13px;
    }
    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      background: #fff;
      -webkit-appearance: none;
      appearance: none;
      font-family: inherit;
    }
    textarea {
      resize: vertical;
      min-height: 44px;
    }
    input:focus, textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    .hint {
      color: #9ca3af;
      font-size: 11px;
      line-height: 1.4;
    }
    .checkbox-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      padding: 0;
      border-radius: 4px;
      -webkit-appearance: checkbox;
      appearance: checkbox;
      flex: 0 0 auto;
      accent-color: #2563eb;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .buttons .btn-hero {
      flex: 1 1 auto;
      min-width: 200px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    button:active { transform: scale(0.98); }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .primary {
      background: #2563eb;
      color: #fff;
      font-weight: 700;
    }
    .hero {
      background: linear-gradient(135deg, #059669, #047857);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 22px;
      box-shadow: 0 4px 14px rgba(5, 150, 105, 0.3);
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .accent {
      background: #059669;
      color: #fff;
      font-weight: 700;
    }
    .danger {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }
    .result {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      display: none;
    }
    .result h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .metric {
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #e5e7eb;
    }
    .metric .name {
      color: #6b7280;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .metric .value {
      font-size: 20px;
      font-weight: 800;
      color: #111827;
    }
    .note-text {
      margin-top: 8px;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.6;
      word-break: break-word;
    }
    .night-warning {
      display: none;
      margin: 12px 0 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      font-weight: 700;
      font-size: 13px;
      line-height: 1.6;
    }
    .chart-card {
      margin-top: 14px;
      padding: 12px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }
    .chart-card h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }
    .chart-wrap {
      width: 100%;
      overflow: hidden;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }
    #solarPathCanvas {
      display: block;
      width: 100%;
      height: 280px;
    }
    .chart-hint {
      margin-top: 8px;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.5;
    }
    .save-strip {
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      background: #fefce8;
      border: 1px solid #fde68a;
      transition: background 0.3s, border-color 0.3s;
    }
    .save-strip.saved {
      background: #f0fdf4;
      border-color: #bbf7d0;
    }
    .save-strip .save-status {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #065f46;
      margin-top: 8px;
      display: none;
    }
    .save-strip.saved .save-status {
      display: block;
    }
    .save-strip .save-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .save-strip .save-btn-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .save-btn-wrap button {
      flex: 1;
    }
    .file-input-hidden {
      display: none;
    }
    .image-preview-wrap {
      display: none;
      margin-top: 12px;
      padding: 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }
    .image-preview-body {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }
    .image-preview-body img {
      width: 112px;
      height: 84px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
    }
    .image-preview-actions {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 180px;
      flex-wrap: wrap;
    }
    .image-preview-actions button {
      flex: 1;
      min-width: 140px;
      padding: 9px 12px;
      font-size: 13px;
      border-radius: 8px;
    }
    .image-status {
      margin-top: 6px;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.5;
    }
    .thumb-cell {
      white-space: normal;
      min-width: 96px;
    }
    .record-thumb {
      width: 52px;
      height: 42px;
      object-fit: cover;
      display: block;
      margin: 0 auto 6px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: #f9fafb;
    }
    .thumb-download-btn {
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      background: #e5e7eb;
      color: #111827;
    }
    .error {
      margin-top: 18px;
      color: #b91c1c;
      font-weight: 600;
      display: none;
      line-height: 1.6;
    }
    .success {
      margin-top: 12px;
      padding: 10px 14px;
      background: #ecfdf5;
      color: #065f46;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      line-height: 1.6;
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .section-title h2 {
      margin: 0;
      font-size: 18px;
    }
    .record-table-wrap {
      margin-top: 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 780px;
    }
    th, td {
      padding: 10px 8px;
      text-align: center;
      border-bottom: 1px solid #e5e7eb;
      white-space: nowrap;
    }
    th {
      background: #f9fafb;
      color: #6b7280;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    td.note-cell, td.landcover-cell {
      max-width: 140px;
      white-space: normal;
      word-break: break-word;
      cursor: pointer;
    }
    td.note-cell:hover, td.landcover-cell:hover {
      background: #eff6ff;
    }
    .note-edit-input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #2563eb;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
    }
    .action-btns {
      display: flex;
      gap: 6px;
      justify-content: center;
    }
    .action-btns button {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 6px;
    }
    .empty-hint {
      text-align: center;
      color: #9ca3af;
      padding: 30px 0;
      font-size: 14px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #e5e7eb;
      color: #4b5563;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
      height: 28px;
      box-sizing: border-box;
    }
    .locating {
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @media (max-width: 680px) {
      .container { margin: 8px auto; }
      .grid, .grid3, .result-grid, .save-strip .save-grid { grid-template-columns: 1fr; }
      .card { padding: 14px; }
      h1 { font-size: 20px; }
      .buttons .btn-hero { min-width: 100%; }
      .save-btn-wrap { flex-direction: column; }
      .image-preview-body { flex-direction: column; }
      .image-preview-actions { width: 100%; min-width: 0; }
      button { width: 100%; }
      .checkbox-row { margin-top: 4px; }
      #solarPathCanvas { height: 240px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- ==================== 第一块：参数输入与计算 ==================== -->
    <div class="card">
      <h1>太阳天顶角计算器</h1>
      <p class="subtitle">
        输入实地测量日期、时间、经纬度和时区，计算太阳天顶角。中国地区通常使用 UTC+8；东经、北纬填正数。
      </p>

      <div class="grid">
        <div class="field">
          <label for="dateInput">测量日期</label>
          <input id="dateInput" type="date">
          <div class="hint">填写光谱文件实际采集日期。</div>
        </div>

        <div class="field">
          <label for="timeInput">测量时间</label>
          <input id="timeInput" type="time" step="1">
          <div class="hint">填写光谱文件实际采集时刻。</div>
        </div>

        <div class="field">
          <label for="timezone">时区 UTC 偏移</label>
          <input id="timezone" type="number" inputmode="decimal" step="0.5" value="8">
          <label class="checkbox-row" for="dstEnabled">
            <input id="dstEnabled" type="checkbox">
            启用夏令时 (DST)
          </label>
          <div class="hint">中国标准时间填 8。</div>
        </div>

        <div class="field">
          <label for="latitude">纬度 Latitude</label>
          <input id="latitude" type="number" inputmode="decimal" step="0.000001" placeholder="例如：30.540000">
          <div class="hint">北纬为正，南纬为负。</div>
        </div>

        <div class="field">
          <label for="longitude">经度 Longitude</label>
          <input id="longitude" type="number" inputmode="decimal" step="0.000001" placeholder="例如：114.360000">
          <div class="hint">东经为正，西经为负。</div>
        </div>
      </div>

      <div class="buttons">
        <button id="autoLocateBtn" class="hero btn-hero" type="button">📍 一键定位并计算</button>
        <button id="calcBtn" class="primary" type="button">计算太阳天顶角</button>
        <button id="nowBtn" class="secondary" type="button">🕐 更新时间</button>
        <button id="whuBtn" class="secondary" type="button">🎓 武大坐标示例</button>
      </div>

      <div id="error" class="error"></div>

      <!-- ===== 计算结果 ===== -->
      <div id="result" class="result">
        <h2>计算结果</h2>
        <div id="nightWarning" class="night-warning"></div>
        <div class="result-grid">
          <div class="metric">
            <div class="name">太阳天顶角</div>
            <div id="zenith" class="value">--</div>
          </div>
          <div class="metric">
            <div class="name">太阳高度角</div>
            <div id="elevation" class="value">--</div>
          </div>
          <div class="metric">
            <div class="name">太阳方位角</div>
            <div id="azimuth" class="value">--</div>
          </div>
        </div>
        <div id="detail" class="note-text"></div>

        <div class="chart-card">
          <h3>当日太阳轨迹图</h3>
          <div class="chart-wrap">
            <canvas id="solarPathCanvas"></canvas>
          </div>
          <div class="chart-hint">X 轴为当地时间 00:00-24:00，Y 轴为太阳高度角；红点为当前测量时间。</div>
        </div>

        <!-- 保存区 -->
        <div id="save-strip" class="save-strip">
          <div class="save-grid">
            <div class="field">
              <label for="landCoverInput">🌿 当前位置对应的地物类型（可选）</label>
              <input id="landCoverInput" type="text" list="landCoverList" placeholder="选择或输入地物类型">
              <datalist id="landCoverList">
                <option value="柏油路面">
                <option value="水泥地面">
                <option value="裸土">
                <option value="草地">
                <option value="水体">
                <option value="钢铁">
                <option value="沙地">
                <option value="雪/冰">
              </datalist>
            </div>
            <div class="field">
              <label for="noteInput">📝 备注（可选）</label>
              <input id="noteInput" type="text" placeholder="样点编号、天气等">
              <input id="imageInput" class="file-input-hidden" type="file" accept="image/*" capture="environment">
              <button id="photoBtn" class="secondary" type="button">📷 拍照 / 上传图片</button>
              <div id="imageStatus" class="image-status"></div>
            </div>
          </div>
          <div id="imagePreviewWrap" class="image-preview-wrap">
            <div class="image-preview-body">
              <img id="imagePreview" src="" alt="图片预览">
              <div class="image-preview-actions">
                <button id="downloadPendingImageBtn" class="secondary" type="button">⬇️ 下载该图片</button>
                <button id="removeImageBtn" class="danger" type="button">移除图片</button>
              </div>
            </div>
          </div>
          <div class="save-btn-wrap">
            <button id="saveBtn" class="accent" type="button">💾 保存本条记录</button>
          </div>
          <div id="saveStatus" class="save-status">✓ 已保存</div>
        </div>

        <div id="successMsg" class="success"></div>
      </div>
    </div>

    <!-- ==================== 第二块：历史记录管理 ==================== -->
    <div class="card">
      <div class="section-title">
        <h2>📋 历史记录</h2>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
          <span id="recordCount" class="badge" style="display: none;"></span>
          <button id="exportBtn" class="secondary" type="button">📥 导出为JSON</button>
          <button id="exportCsvBtn" class="secondary" type="button">📊 导出为CSV</button>
          <button id="clearAllBtn" class="danger" type="button">🗑 清空全部</button>
        </div>
      </div>

      <div id="recordPanel">
        <div class="empty-hint">暂无保存的记录。计算并保存后，记录将显示在此处。</div>
      </div>
    </div>

  </div>

  <script>
    // ===================== 工具函数 =====================
    function getEl(id) { return document.getElementById(id); }
    function degToRad(deg) { return deg * Math.PI / 180; }
    function radToDeg(rad) { return rad * 180 / Math.PI; }
    function fixAngle(angle) {
      angle = angle % 360;
      return angle < 0 ? angle + 360 : angle;
    }
    function pad2(n) {
      n = Number(n);
      return n < 10 ? "0" + n : String(n);
    }
    function isFiniteNumber(n) {
      return typeof n === "number" && isFinite(n);
    }

    // ===================== 提示信息 =====================
    function showError(message) {
      var errorBox = getEl("error");
      getEl("result").style.display = "none";
      errorBox.innerHTML = message;
      errorBox.style.display = "block";
    }
    function hideError() {
      getEl("error").style.display = "none";
      getEl("error").innerHTML = "";
    }
    function showSuccess(message, duration) {
      var box = getEl("successMsg");
      box.innerHTML = message;
      box.style.display = "block";
      if (duration) {
        setTimeout(function() { box.style.display = "none"; }, duration);
      }
    }

    // ===================== 表单快捷操作 =====================
    function setCurrentTime() {
      var now = new Date();
      getEl("dateInput").value = now.getFullYear() + "-" + pad2(now.getMonth() + 1) + "-" + pad2(now.getDate());
      getEl("timeInput").value = pad2(now.getHours()) + ":" + pad2(now.getMinutes()) + ":" + pad2(now.getSeconds());
    }
    function fillWHUExample() {
      getEl("latitude").value = "30.540000";
      getEl("longitude").value = "114.360000";
      getEl("timezone").value = "8";
      getEl("dstEnabled").checked = false;
    }

    // ===================== 一键 GPS 定位 =====================
    var lastGpsAccuracy = null;    // 最近一次 GPS 定位精度（米），手动输入时为 null
    var lastGpsTimestamp = null;   // 最近一次 GPS 定位时间戳

    function autoLocate() {
      hideError();
      getEl("successMsg").style.display = "none";
      setCurrentTime();

      if (!navigator.geolocation) {
        showError("您的浏览器不支持地理定位功能，请手动输入经纬度。");
        return;
      }

      var btn = getEl("autoLocateBtn");
      var originalText = btn.innerHTML;
      btn.innerHTML = "⏳ 正在定位并计算...";
      btn.disabled = true;
      btn.classList.add("locating");

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          getEl("latitude").value = pos.coords.latitude.toFixed(6);
          getEl("longitude").value = pos.coords.longitude.toFixed(6);

          // 存储定位精度与时间戳
          lastGpsAccuracy = (pos.coords.accuracy != null) ? pos.coords.accuracy : null;
          lastGpsTimestamp = pos.timestamp || Date.now();

          var accMsg = (lastGpsAccuracy != null)
            ? "，定位精度约 " + (lastGpsAccuracy < 1 ? lastGpsAccuracy.toFixed(1) : Math.round(lastGpsAccuracy)) + " 米"
            : "";

          btn.innerHTML = originalText;
          btn.disabled = false;
          btn.classList.remove("locating");

          // 定位成功后自动计算
          calculateSolarZenith();
          showSuccess("✅ 定位成功，已自动计算" + accMsg + "。", 4000);
        },
        function(err) {
          btn.innerHTML = originalText;
          btn.disabled = false;
          btn.classList.remove("locating");
          var msg;
          switch(err.code) {
            case err.PERMISSION_DENIED: msg = "定位授权被拒绝，请在浏览器设置中允许位置访问。"; break;
            case err.POSITION_UNAVAILABLE: msg = "无法获取位置信息，请检查设备 GPS 是否已开启。"; break;
            case err.TIMEOUT: msg = "定位超时，请重试或手动输入经纬度。"; break;
            default: msg = "定位失败：" + err.message;
          }
          showError(msg);
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }
      );
    }

    // ===================== 日期时间解析 =====================
    function parseInputDateTime(dateValue, timeValue, timezone) {
      var dm = /^(\d{4})-(\d{2})-(\d{2})$/.exec(dateValue);
      var tm = /^(\d{2}):(\d{2})(?::(\d{2}))?$/.exec(timeValue);
      if (!dm || !tm) return null;

      var year = Number(dm[1]);
      var month = Number(dm[2]);
      var day = Number(dm[3]);
      var hour = Number(tm[1]);
      var minute = Number(tm[2]);
      var second = Number(tm[3] || 0);

      if (hour < 0 || hour > 23 || minute < 0 || minute > 59 || second < 0 || second > 59) return null;

      var utcMillis = Date.UTC(year, month - 1, day, hour, minute, second) - timezone * 60 * 60 * 1000;
      return {
        year: year, month: month, day: day,
        hour: hour, minute: minute, second: second,
        utcMillis: utcMillis
      };
    }

    // ===================== 核心：太阳天顶角计算 =====================
    function computeSolarPosition(latitude, longitude, dateValue, timeValue, timezone) {
      var dt = parseInputDateTime(dateValue, timeValue, timezone);
      if (!dt) return null;

      var jd = dt.utcMillis / 86400000 + 2440587.5;
      var T = (jd - 2451545.0) / 36525.0;

      var L0 = fixAngle(280.46646 + T * (36000.76983 + T * 0.0003032));
      var M = 357.52911 + T * (35999.05029 - 0.0001537 * T);
      var e = 0.016708634 - T * (0.000042037 + 0.0000001267 * T);

      var C = Math.sin(degToRad(M)) * (1.914602 - T * (0.004817 + 0.000014 * T)) +
              Math.sin(degToRad(2 * M)) * (0.019993 - 0.000101 * T) +
              Math.sin(degToRad(3 * M)) * 0.000289;
      var trueLong = L0 + C;
      var omega = 125.04 - 1934.136 * T;
      var apparentLong = trueLong - 0.00569 - 0.00478 * Math.sin(degToRad(omega));

      var meanObliq = 23 + (26 + ((21.448 - T * (46.815 + T * (0.00059 - T * 0.001813))) / 60)) / 60;
      var obliqCorr = meanObliq + 0.00256 * Math.cos(degToRad(omega));

      var decl = radToDeg(Math.asin(Math.sin(degToRad(obliqCorr)) * Math.sin(degToRad(apparentLong))));

      var y = Math.tan(degToRad(obliqCorr) / 2);
      var y2 = y * y;
      var eqTime = 4 * radToDeg(
        y2 * Math.sin(2 * degToRad(L0)) -
        2 * e * Math.sin(degToRad(M)) +
        4 * e * y2 * Math.sin(degToRad(M)) * Math.cos(2 * degToRad(L0)) -
        0.5 * y2 * y2 * Math.sin(4 * degToRad(L0)) -
        1.25 * e * e * Math.sin(2 * degToRad(M))
      );

      var minutes = dt.hour * 60 + dt.minute + dt.second / 60;
      var trueSolarTime = minutes + eqTime + 4 * longitude - 60 * timezone;
      trueSolarTime = ((trueSolarTime % 1440) + 1440) % 1440;

      var hourAngle = trueSolarTime / 4 - 180;
      if (hourAngle < -180) hourAngle += 360;

      var latRad = degToRad(latitude);
      var declRad = degToRad(decl);
      var haRad = degToRad(hourAngle);

      var cosZenith = Math.sin(latRad) * Math.sin(declRad) +
                      Math.cos(latRad) * Math.cos(declRad) * Math.cos(haRad);
      if (cosZenith > 1) cosZenith = 1;
      if (cosZenith < -1) cosZenith = -1;

      var zenith = radToDeg(Math.acos(cosZenith));
      var elevation = 90 - zenith;

      var azimuth;
      var zenithRad = degToRad(zenith);
      if (Math.abs(Math.sin(zenithRad)) < 0.00000001) {
        azimuth = 0;
      } else {
        var azArg = ((Math.sin(latRad) * Math.cos(zenithRad)) - Math.sin(declRad)) /
                    (Math.cos(latRad) * Math.sin(zenithRad));
        if (azArg > 1) azArg = 1;
        if (azArg < -1) azArg = -1;

        var az = radToDeg(Math.acos(azArg));
        azimuth = hourAngle > 0 ? (az + 180) % 360 : (540 - az) % 360;
      }

      return {
        zenith: zenith,
        elevation: elevation,
        azimuth: azimuth,
        decl: decl,
        trueSolarTime: trueSolarTime
      };
    }

    // ===================== 当日太阳轨迹图 =====================
    function minutesToTimeValue(minutes) {
      minutes = Math.max(0, Math.min(1439, Math.round(minutes)));
      return pad2(Math.floor(minutes / 60)) + ":" + pad2(minutes % 60) + ":00";
    }

    function parseTimeToMinutes(timeValue) {
      var tm = /^(\d{2}):(\d{2})(?::(\d{2}))?$/.exec(timeValue);
      if (!tm) return null;
      return Number(tm[1]) * 60 + Number(tm[2]) + Number(tm[3] || 0) / 60;
    }

    function buildSolarPathData(latitude, longitude, dateValue, timezone) {
      var points = [];
      for (var minutes = 0; minutes < 1440; minutes += 30) {
        var position = computeSolarPosition(latitude, longitude, dateValue, minutesToTimeValue(minutes), timezone);
        if (position) {
          points.push({
            minutes: minutes,
            elevation: position.elevation,
            azimuth: position.azimuth
          });
        }
      }

      var lastPosition = computeSolarPosition(latitude, longitude, dateValue, "23:59:00", timezone);
      if (lastPosition) {
        points.push({
          minutes: 1439,
          elevation: lastPosition.elevation,
          azimuth: lastPosition.azimuth
        });
      }
      return points;
    }

    function drawSolarPathChart(points, currentMinutes, currentElevation, timeValue) {
      var canvas = getEl("solarPathCanvas");
      if (!canvas || !canvas.getContext || !points.length) return;

      var rect = canvas.getBoundingClientRect();
      var width = Math.max(320, Math.round(rect.width || canvas.clientWidth || 760));
      var height = Math.max(220, Math.round(rect.height || 280));
      var ratio = window.devicePixelRatio || 1;
      canvas.width = width * ratio;
      canvas.height = height * ratio;

      var ctx = canvas.getContext("2d");
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.clearRect(0, 0, width, height);

      var padLeft = 48;
      var padRight = 18;
      var padTop = 18;
      var padBottom = 34;
      var plotWidth = width - padLeft - padRight;
      var plotHeight = height - padTop - padBottom;
      var minElevation = currentElevation;

      for (var i = 0; i < points.length; i++) {
        minElevation = Math.min(minElevation, points[i].elevation);
      }

      var yMax = 90;
      var yMin = Math.min(0, Math.floor(minElevation / 10) * 10);
      if (yMin > -10) yMin = -10;
      if (yMin < -90) yMin = -90;

      function xForMinute(minutes) {
        return padLeft + (minutes / 1440) * plotWidth;
      }
      function yForElevation(elevation) {
        var clamped = Math.max(yMin, Math.min(yMax, elevation));
        return padTop + ((yMax - clamped) / (yMax - yMin)) * plotHeight;
      }

      ctx.fillStyle = "#f8fafc";
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = "#e5e7eb";
      ctx.lineWidth = 1;
      ctx.fillStyle = "#6b7280";
      ctx.font = "11px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";

      for (var elev = 0; elev <= 90; elev += 30) {
        var gy = yForElevation(elev);
        ctx.beginPath();
        ctx.moveTo(padLeft, gy);
        ctx.lineTo(width - padRight, gy);
        ctx.stroke();
        ctx.fillText(elev + "°", padLeft - 8, gy);
      }

      if (yMin < 0) {
        for (var neg = -30; neg >= yMin; neg -= 30) {
          var ngy = yForElevation(neg);
          ctx.beginPath();
          ctx.moveTo(padLeft, ngy);
          ctx.lineTo(width - padRight, ngy);
          ctx.stroke();
          ctx.fillText(neg + "°", padLeft - 8, ngy);
        }
      }

      ctx.strokeStyle = "#cbd5e1";
      ctx.beginPath();
      ctx.moveTo(padLeft, padTop);
      ctx.lineTo(padLeft, height - padBottom);
      ctx.lineTo(width - padRight, height - padBottom);
      ctx.stroke();

      var zeroY = yForElevation(0);
      ctx.strokeStyle = "#94a3b8";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(padLeft, zeroY);
      ctx.lineTo(width - padRight, zeroY);
      ctx.stroke();

      ctx.fillStyle = "#6b7280";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      for (var hour = 0; hour <= 24; hour += 6) {
        var tx = xForMinute(hour * 60);
        ctx.strokeStyle = "#e5e7eb";
        ctx.beginPath();
        ctx.moveTo(tx, padTop);
        ctx.lineTo(tx, height - padBottom);
        ctx.stroke();
        ctx.fillText(pad2(hour) + ":00", tx, height - padBottom + 8);
      }

      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      for (var p = 0; p < points.length - 1; p++) {
        var px = xForMinute(points[p].minutes);
        var py = yForElevation(points[p].elevation);
        var nextX = xForMinute(points[p + 1].minutes);
        var nextY = yForElevation(points[p + 1].elevation);
        var midX = (px + nextX) / 2;
        var midY = (py + nextY) / 2;
        if (p === 0) ctx.moveTo(px, py);
        ctx.quadraticCurveTo(px, py, midX, midY);
      }
      var lastPoint = points[points.length - 1];
      ctx.lineTo(xForMinute(lastPoint.minutes), yForElevation(lastPoint.elevation));
      ctx.stroke();

      if (isFiniteNumber(currentMinutes) && isFiniteNumber(currentElevation)) {
        var cx = xForMinute(currentMinutes);
        var cy = yForElevation(currentElevation);
        ctx.fillStyle = "#dc2626";
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        var label = timeValue.slice(0, 5) + "  " + currentElevation.toFixed(1) + "°";
        ctx.font = "12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
        var labelWidth = ctx.measureText(label).width + 14;
        var labelX = Math.min(width - padRight - labelWidth / 2, Math.max(padLeft + labelWidth / 2, cx + 42));
        var labelY = Math.max(padTop + 8, Math.min(height - padBottom - 28, cy - 28));

        ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
        ctx.strokeStyle = "#fecaca";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if (ctx.roundRect) {
          ctx.roundRect(labelX - labelWidth / 2, labelY - 12, labelWidth, 24, 8);
        } else {
          ctx.rect(labelX - labelWidth / 2, labelY - 12, labelWidth, 24);
        }
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = "#b91c1c";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label, labelX, labelY);
      }
    }

    function updateNightWarning(elevation) {
      var box = getEl("nightWarning");
      if (!box) return;
      if (elevation <= 0) {
        box.textContent = "⚠️ 警告：当前时刻太阳已落山（或未升起），太阳高度角为负值，不适合进行光谱测量！";
        box.style.display = "block";
      } else {
        box.textContent = "";
        box.style.display = "none";
      }
    }

    // ===================== 计算按钮逻辑 =====================
    var lastCalcResult = null; // 暂存最近一次计算结果，供保存使用

    function calculateSolarZenith() {
      hideError();
      getEl("successMsg").style.display = "none";

      var dateValue = getEl("dateInput").value;
      var timeValue = getEl("timeInput").value;
      var latitude = Number(getEl("latitude").value);
      var longitude = Number(getEl("longitude").value);
      var timezone = Number(getEl("timezone").value);
      var dstEnabled = getEl("dstEnabled").checked;
      var effectiveTimezone = timezone + (dstEnabled ? 1 : 0);

      if (!dateValue || !timeValue || !isFiniteNumber(latitude) || !isFiniteNumber(longitude) || !isFiniteNumber(timezone)) {
        showError("请完整输入测量日期、测量时间、纬度、经度和时区。");
        return;
      }
      if (latitude < -90 || latitude > 90) {
        showError("纬度范围应为 -90 到 90。");
        return;
      }
      if (longitude < -180 || longitude > 180) {
        showError("经度范围应为 -180 到 180。");
        return;
      }
      if (timezone < -12 || timezone > 14) {
        showError("时区通常应在 -12 到 +14 之间；中国标准时间填 8。");
        return;
      }

      var result = computeSolarPosition(latitude, longitude, dateValue, timeValue, effectiveTimezone);
      if (!result) {
        showError("日期或时间格式无效，请重新输入。");
        return;
      }

      // 暂存供保存
      lastCalcResult = {
        dateValue: dateValue,
        timeValue: timeValue,
        timezone: timezone,
        effectiveTimezone: effectiveTimezone,
        dstEnabled: dstEnabled,
        latitude: latitude,
        longitude: longitude,
        zenith: result.zenith,
        elevation: result.elevation,
        azimuth: result.azimuth,
        decl: result.decl,
        trueSolarTime: result.trueSolarTime,
        gpsAccuracy: lastGpsAccuracy,
        gpsTimestamp: lastGpsTimestamp
      };

      // 显示结果
      getEl("zenith").innerHTML = result.zenith.toFixed(3) + "°";
      getEl("elevation").innerHTML = result.elevation.toFixed(3) + "°";
      getEl("azimuth").innerHTML = result.azimuth.toFixed(3) + "°";
      var detailHtml =
        "测量时间：" + dateValue + " " + timeValue + "，时区：UTC" + (timezone >= 0 ? "+" : "") + timezone +
        (dstEnabled ? "（DST 启用，实际按 UTC" + (effectiveTimezone >= 0 ? "+" : "") + effectiveTimezone + " 计算）" : "") +
        "；纬度：" + latitude.toFixed(6) + "°，经度：" + longitude.toFixed(6) + "°。" +
        "<br>太阳赤纬约为 " + result.decl.toFixed(3) + "°，真太阳时约为 " + (result.trueSolarTime / 60).toFixed(3) + " 小时。";
      if (lastGpsAccuracy != null) {
        detailHtml += "<br>📍 坐标来源：GPS 定位，精度约 " + (lastGpsAccuracy < 1 ? lastGpsAccuracy.toFixed(1) : Math.round(lastGpsAccuracy)) + " 米";
      }
      getEl("detail").innerHTML = detailHtml;
      updateNightWarning(result.elevation);

      getEl("result").style.display = "block";
      drawSolarPathChart(
        buildSolarPathData(latitude, longitude, dateValue, effectiveTimezone),
        parseTimeToMinutes(timeValue),
        result.elevation,
        timeValue
      );

      // 重置保存区状态（新计算结果，未保存）
      resetSaveStrip();

      // 自动滚动到结果区，聚焦地物类型输入框
      getEl("result").scrollIntoView({ behavior: "smooth", block: "start" });
      setTimeout(function() { getEl("landCoverInput").focus(); }, 400);
    }

    // ===================== 本地存储管理 =====================
    var STORAGE_KEY = "solarZenithRecords_v2";

    function getRecords() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (e) {
        return [];
      }
    }

    function saveRecordsToStorage(records) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
        return true;
      } catch (e) {
        showError("存储空间不足！请导出记录后清理部分数据。");
        return false;
      }
    }

    // ===================== 图片压缩与下载 =====================
    var pendingImageBase64 = null;

    function formatTimestampForFilename(date) {
      return date.getFullYear() + pad2(date.getMonth() + 1) + pad2(date.getDate()) + "_" +
             pad2(date.getHours()) + pad2(date.getMinutes()) + pad2(date.getSeconds());
    }

    function getImageFilename(record) {
      if (record && record.date && record.time) {
        return "spectrum_record_" + String(record.date).replace(/-/g, "") + "_" +
          String(record.time).replace(/:/g, "").slice(0, 6) + ".jpg";
      }
      return "spectrum_record_" + formatTimestampForFilename(new Date()) + ".jpg";
    }

    function setImageStatus(message) {
      var status = getEl("imageStatus");
      if (status) status.textContent = message || "";
    }

    function showPendingImage(base64) {
      pendingImageBase64 = base64;
      getEl("imagePreview").src = base64;
      getEl("imagePreviewWrap").style.display = "block";
    }

    function clearPendingImage() {
      pendingImageBase64 = null;
      getEl("imagePreview").src = "";
      getEl("imagePreviewWrap").style.display = "none";
      getEl("imageInput").value = "";
      setImageStatus("");
    }

    function compressImageFile(file) {
      return new Promise(function(resolve, reject) {
        if (!file || !/^image\//.test(file.type)) {
          reject(new Error("请选择图片文件。"));
          return;
        }

        var reader = new FileReader();
        reader.onerror = function() { reject(new Error("图片读取失败。")); };
        reader.onload = function(e) {
          var img = new Image();
          img.onerror = function() { reject(new Error("图片加载失败，请更换图片重试。")); };
          img.onload = function() {
            var maxSide = 1280;
            var width = img.naturalWidth || img.width;
            var height = img.naturalHeight || img.height;
            var scale = Math.min(1, maxSide / Math.max(width, height));
            var targetWidth = Math.max(1, Math.round(width * scale));
            var targetHeight = Math.max(1, Math.round(height * scale));
            var canvas = document.createElement("canvas");
            canvas.width = targetWidth;
            canvas.height = targetHeight;
            var ctx = canvas.getContext("2d");
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, targetWidth, targetHeight);
            ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
            resolve(canvas.toDataURL("image/jpeg", 0.7));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function handleImageSelect(e) {
      var file = e.target.files && e.target.files[0];
      if (!file) return;

      setImageStatus("正在压缩图片...");
      compressImageFile(file).then(function(base64) {
        showPendingImage(base64);
        var sizeKb = Math.round(base64.length * 0.75 / 1024);
        setImageStatus("图片已压缩，约 " + sizeKb + " KB。");
      }).catch(function(err) {
        clearPendingImage();
        setImageStatus(err.message || "图片处理失败。");
      });
    }

    function base64ToBlob(base64) {
      var parts = base64.split(",");
      var mimeMatch = parts[0].match(/:(.*?);/);
      var mime = mimeMatch ? mimeMatch[1] : "image/jpeg";
      var binary = atob(parts[1]);
      var length = binary.length;
      var bytes = new Uint8Array(length);
      for (var i = 0; i < length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      return new Blob([bytes], { type: mime });
    }

    function downloadBlob(blob, filename) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadBase64Image(base64, filename) {
      if (!base64) return;
      downloadBlob(base64ToBlob(base64), filename || getImageFilename());
    }

    function downloadPendingImage() {
      if (!pendingImageBase64) {
        setImageStatus("请先拍照或上传图片。");
        return;
      }
      downloadBase64Image(pendingImageBase64, getImageFilename());
    }

    function downloadRecordImage(id) {
      var records = getRecords();
      for (var i = 0; i < records.length; i++) {
        if (records[i].id === id && records[i].imageBase64) {
          downloadBase64Image(records[i].imageBase64, getImageFilename(records[i]));
          return;
        }
      }
      showError("未找到该记录的图片。");
    }

    // ===================== 保存本条记录 =====================
    var lastSavedId = null;  // 最近一次保存的记录 ID，用于防重复保存

    function resetSaveStrip() {
      var strip = getEl("save-strip");
      if (strip) strip.classList.remove("saved");
      getEl("saveStatus").style.display = "none";
      getEl("saveBtn").innerHTML = "💾 保存本条记录";
      clearPendingImage();
      lastSavedId = null;
    }

    function saveCurrentRecord() {
      if (!lastCalcResult) {
        showError("请先完成一次计算后再保存。");
        return;
      }

      // 如果当前结果已保存过，提示用户
      if (lastSavedId != null) {
        if (!confirm("当前计算结果似乎已经保存过了。\n\n是否重复保存同一个结果？")) {
          return;
        }
      }

      var landCover = getEl("landCoverInput").value.trim();
      var note = getEl("noteInput").value.trim();
      var r = lastCalcResult;

      var record = {
        id: Date.now(),
        date: r.dateValue,
        time: r.timeValue,
        timezone: r.timezone,
        effectiveTimezone: r.effectiveTimezone,
        dstEnabled: r.dstEnabled,
        latitude: r.latitude,
        longitude: r.longitude,
        zenith: r.zenith,
        elevation: r.elevation,
        azimuth: r.azimuth,
        decl: r.decl,
        trueSolarTime: r.trueSolarTime,
        gpsAccuracy: r.gpsAccuracy,
        gpsTimestamp: r.gpsTimestamp,
        landCover: landCover,
        note: note,
        imageBase64: pendingImageBase64,
        savedAt: new Date().toISOString()
      };

      var records = getRecords();
      records.unshift(record);
      if (!saveRecordsToStorage(records)) return;
      renderRecordTable();

      // 标记已保存，切换状态
      lastSavedId = record.id;
      var strip = getEl("save-strip");
      if (strip) strip.classList.add("saved");
      getEl("saveStatus").style.display = "block";
      getEl("saveBtn").innerHTML = "✅ 已保存";

      getEl("landCoverInput").value = "";
      getEl("noteInput").value = "";
      clearPendingImage();
      showSuccess("✅ 记录已保存！", 2000);
    }

    // ===================== 渲染历史记录表格 =====================
    function renderRecordTable() {
      var records = getRecords();
      var panel = getEl("recordPanel");
      var countBadge = getEl("recordCount");

      if (records.length === 0) {
        panel.innerHTML = '<div class="empty-hint">暂无保存的记录。计算并保存后，记录将显示在此处。</div>';
        countBadge.style.display = "none";
        return;
      }

      countBadge.style.display = "inline-block";
      countBadge.textContent = "共 " + records.length + " 条";

      var html = '<div class="record-table-wrap"><table>';

      html += '<th>地物类型</th><th>备注</th><th>图片</th><th>操作</th>';
      html += '</tr></thead><tbody>';

      for (var i = 0; i < records.length; i++) {
        var rec = records[i];
        html += '<tr>';
        html += '<td>' + (records.length - i) + '</td>';
        html += '<td>' + rec.date + '</td>';

        html += '<td>' + (rec.longitude != null ? rec.longitude.toFixed(6) : "--") + '</td>';
        html += '<td>' + formatAccuracy(rec.gpsAccuracy) + '</td>';
        html += '<td>' + (rec.zenith != null ? rec.zenith.toFixed(3) + "°" : "--") + '</td>';
        html += '<td>' + (rec.elevation != null ? rec.elevation.toFixed(3) + "°" : "--") + '</td>';
        html += '<td>' + (rec.azimuth != null ? rec.azimuth.toFixed(3) + "°" : "--") + '</td>';
        html += '<td class="landcover-cell" data-id="' + rec.id + '" data-landcover="' + escAttr(rec.landCover || "") + '">'
             + escHtml(rec.landCover || "（双击编辑）") + '</td>';
        html += '<td class="note-cell" data-id="' + rec.id + '" data-note="' + escAttr(rec.note || "") + '">'
             + escHtml(rec.note || "（双击编辑）") + '</td>';
        if (rec.imageBase64) {
          html += '<td class="thumb-cell"><img class="record-thumb" src="' + escAttr(rec.imageBase64) + '" alt="记录图片">'
               + '<button class="thumb-download-btn" type="button" onclick="downloadRecordImage(' + rec.id + ')">⬇️ 下载</button></td>';
        } else {
          html += '<td class="thumb-cell"><span style="color:#9ca3af;">无图片</span></td>';
        }
        html += '<td><div class="action-btns">';
        html += '<button class="secondary" onclick="deleteRecord(' + rec.id + ')">删除</button>';
        html += '</div></td>';
        html += '</tr>';
      }

      html += '</tbody></table></div>';
      panel.innerHTML = html;

      // 绑定双击编辑
      bindCellEdit("note-cell", "data-note", updateNoteInStorage);
      bindCellEdit("landcover-cell", "data-landcover", updateLandCoverInStorage);
    }

    function formatAccuracy(acc) {
      if (acc == null) return "手动输入";
      if (acc < 1) return acc.toFixed(1) + " m";
      return Math.round(acc) + " m";
    }
    function escHtml(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    function escAttr(str) {
      return String(str).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function getExportRecords(records) {
      return records.map(function(record) {
        var clone = JSON.parse(JSON.stringify(record));
        clone.hasImage = clone.imageBase64 ? "是" : "否";
        delete clone.imageBase64;
        delete clone.image;
        return clone;
      });
    }

    // ===================== 双击编辑（通用） =====================
    function bindCellEdit(className, dataAttr, updateFn) {
      var cells = document.querySelectorAll("td." + className);
      for (var i = 0; i < cells.length; i++) {
        cells[i].addEventListener("dblclick", function(e) {
          var td = e.currentTarget;
          var id = Number(td.getAttribute("data-id"));
          var currentValue = td.getAttribute(dataAttr);

          var input = document.createElement("input");
          input.type = "text";
          input.value = currentValue;
          input.className = "note-edit-input";
          input.style.width = "100%";
          td.innerHTML = "";
          td.appendChild(input);
          input.focus();
          input.select();

          function finishEdit() {
            var newValue = input.value.trim();
            updateFn(id, newValue);
            renderRecordTable();
          }

          input.addEventListener("blur", finishEdit);
          input.addEventListener("keydown", function(ev) {
            if (ev.key === "Enter") finishEdit();
            if (ev.key === "Escape") renderRecordTable();
          });
        });
      }
    }

    function updateNoteInStorage(id, newNote) {
      var records = getRecords();
      for (var i = 0; i < records.length; i++) {
        if (records[i].id === id) {
          records[i].note = newNote;
          break;
        }
      }
      saveRecordsToStorage(records);
    }

    function updateLandCoverInStorage(id, newLandCover) {
      var records = getRecords();
      for (var i = 0; i < records.length; i++) {
        if (records[i].id === id) {
          records[i].landCover = newLandCover;
          break;
        }
      }
      saveRecordsToStorage(records);
    }

    // ===================== 删除记录 =====================
    function deleteRecord(id) {
      if (!confirm("确定要删除这条记录吗？此操作不可撤销。")) return;

      var records = getRecords();
      records = records.filter(function(r) { return r.id !== id; });
      saveRecordsToStorage(records);
      renderRecordTable();
    }

    // ===================== 清空全部记录 =====================
    function clearAllRecords() {
      var records = getRecords();
      if (records.length === 0) {
        showError("暂无记录可清空。");
        return;
      }
      if (!confirm("确定要清空全部 " + records.length + " 条记录吗？此操作不可撤销。\n\n建议先导出备份。")) return;

      saveRecordsToStorage([]);
      renderRecordTable();
    }

    // ===================== 导出 JSON =====================
    function exportRecords() {
      var records = getRecords();
      if (records.length === 0) {
        showError("暂无记录可导出。");
        return;
      }

      var exportRecords = getExportRecords(records);
      var exportData = exportRecords.map(function(r) {
        return {
          编号: r.id,
          测量日期: r.date,
          测量时间: r.time,
          时区: "UTC" + (r.timezone >= 0 ? "+" : "") + r.timezone,
          夏令时DST: r.dstEnabled ? "是" : "否",
          实际UTC偏移: r.effectiveTimezone != null ? "UTC" + (r.effectiveTimezone >= 0 ? "+" : "") + r.effectiveTimezone : "",
          纬度: r.latitude != null ? r.latitude.toFixed(6) : "",
          经度: r.longitude != null ? r.longitude.toFixed(6) : "",
          定位方式: r.gpsAccuracy != null ? "GPS" : "手动",
          定位精度_米: r.gpsAccuracy != null ? (r.gpsAccuracy < 1 ? r.gpsAccuracy.toFixed(1) : Math.round(r.gpsAccuracy)) : "",
          太阳天顶角_deg: r.zenith != null ? r.zenith.toFixed(3) : "",
          太阳高度角_deg: r.elevation != null ? r.elevation.toFixed(3) : "",
          太阳方位角_deg: r.azimuth != null ? r.azimuth.toFixed(3) : "",
          太阳赤纬_deg: r.decl != null ? r.decl.toFixed(3) : "",
          真太阳时_小时: r.trueSolarTime != null ? (r.trueSolarTime / 60).toFixed(3) : "",
          地物类型: r.landCover || "",
          备注: r.note || "",
          有图片: r.hasImage || "否",
          保存时间: r.savedAt || ""
        };
      });

      var jsonStr = JSON.stringify(exportData, null, 2);
      var blob = new Blob(["\uFEFF" + jsonStr], { type: "application/json;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "太阳天顶角记录_" + new Date().toISOString().slice(0, 10) + ".json";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      showSuccess("✅ 已导出 " + records.length + " 条记录 (JSON，不含图片数据)。", 3000);
    }

    // ===================== 导出 CSV =====================
    function exportCsv() {
      var records = getRecords();
      if (records.length === 0) {
        showError("暂无记录可导出。");
        return;
      }

      var exportRecords = getExportRecords(records);
      var headers = ["编号", "测量日期", "测量时间", "时区", "夏令时DST", "实际UTC偏移", "纬度", "经度",
        "定位方式", "定位精度(米)", "太阳天顶角(°)", "太阳高度角(°)",
        "太阳方位角(°)", "太阳赤纬(°)", "真太阳时(小时)", "地物类型", "备注", "有图片", "保存时间"];

      function csvEscape(val) {
        if (val == null) return "";
        var s = String(val);
        if (s.indexOf(",") !== -1 || s.indexOf("\"") !== -1 || s.indexOf("\n") !== -1) {
          s = s.replace(/"/g, "\"\"");
          return "\"" + s + "\"";
        }
        return s;
      }

      var rows = [headers.join(",")];
      for (var i = 0; i < exportRecords.length; i++) {
        var r = exportRecords[i];
        var row = [
          csvEscape(r.id),
          csvEscape(r.date),
          csvEscape(r.time),
          csvEscape("UTC" + (r.timezone >= 0 ? "+" : "") + r.timezone),
          csvEscape(r.dstEnabled ? "是" : "否"),
          csvEscape(r.effectiveTimezone != null ? "UTC" + (r.effectiveTimezone >= 0 ? "+" : "") + r.effectiveTimezone : ""),
          csvEscape(r.latitude != null ? r.latitude.toFixed(6) : ""),
          csvEscape(r.longitude != null ? r.longitude.toFixed(6) : ""),
          csvEscape(r.gpsAccuracy != null ? "GPS" : "手动"),
          csvEscape(r.gpsAccuracy != null ? (r.gpsAccuracy < 1 ? r.gpsAccuracy.toFixed(1) : Math.round(r.gpsAccuracy)) : ""),
          csvEscape(r.zenith != null ? r.zenith.toFixed(3) : ""),
          csvEscape(r.elevation != null ? r.elevation.toFixed(3) : ""),
          csvEscape(r.azimuth != null ? r.azimuth.toFixed(3) : ""),
          csvEscape(r.decl != null ? r.decl.toFixed(3) : ""),
          csvEscape(r.trueSolarTime != null ? (r.trueSolarTime / 60).toFixed(3) : ""),
          csvEscape(r.landCover || ""),
          csvEscape(r.note || ""),
          csvEscape(r.hasImage || "否"),
          csvEscape(r.savedAt || "")
        ];
        rows.push(row.join(","));
      }

      var csvStr = "\uFEFF" + rows.join("\n");
      var blob = new Blob([csvStr], { type: "text/csv;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "太阳天顶角记录_" + new Date().toISOString().slice(0, 10) + ".csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      showSuccess("✅ 已导出 " + records.length + " 条记录 (CSV，不含图片数据)。", 3000);
    }

    // ===================== 页面初始化 =====================
    function bindButtons() {
      getEl("calcBtn").onclick = calculateSolarZenith;
      getEl("autoLocateBtn").onclick = autoLocate;
      getEl("whuBtn").onclick = fillWHUExample;
      getEl("nowBtn").onclick = setCurrentTime;
      getEl("saveBtn").onclick = saveCurrentRecord;
      getEl("exportBtn").onclick = exportRecords;
      getEl("exportCsvBtn").onclick = exportCsv;
      getEl("clearAllBtn").onclick = clearAllRecords;
      getEl("photoBtn").onclick = function() { getEl("imageInput").click(); };
      getEl("imageInput").addEventListener("change", handleImageSelect);
      getEl("downloadPendingImageBtn").onclick = downloadPendingImage;
      getEl("removeImageBtn").onclick = clearPendingImage;

      fillWHUExample();
      setCurrentTime();
      renderRecordTable();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bindButtons);
    } else {
      bindButtons();
    }
  </script>
</body>
</html>
